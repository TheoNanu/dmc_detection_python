name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # opencv-python needs these shared libraries on headless Linux runners
      # (import cv2 fails with "libGL.so.1: cannot open shared object file").
      - name: Install OpenCV system libraries
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install package with test extras
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -v
